name: Import and Process DWD Weather Data

on:
  schedule:
    # Run at 02:00 UTC on the 1st of every month
    - cron: '0 2 1 * *'
  workflow_dispatch:
    # Allow manual triggers from the GitHub Actions UI

permissions:
  contents: write

jobs:
  import-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 lxml
          
      - name: Run data processing pipeline
        run: |
          python download_and_process.py
          
      - name: Commit and push updated data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/weather_data.json
          if ! git diff-index --quiet HEAD; then
            git commit -m "Auto-import latest DWD climate data"
            git push
          else
            echo "No new weather data changes to commit."
          fi
